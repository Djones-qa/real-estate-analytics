project:
  name: "Real Estate Market Analytics"
  version: "1.0.0"
  author: "Darrius Jones"
  description: "Price prediction and market trend analysis"

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  external_dir: "data/external"
  target_column: "sale_price"
  date_column: "sale_date"
  id_column: "property_id"

database:
  dialect: "sqlite"
  name: "real_estate.db"
  schema: "analytics"

features:
  numeric:
    - square_feet
    - lot_size
    - bedrooms
    - bathrooms
    - year_built
    - garage_spaces
    - stories
  categorical:
    - property_type
    - neighborhood
    - condition
    - heating_type
    - roof_type
    - zoning
  geospatial:
    - latitude
    - longitude
    - zip_code

model:
  test_size: 0.2
  random_state: 42
  cv_folds: 5
  scoring_metric: "neg_mean_absolute_error"
  algorithms:
    - linear_regression
    - random_forest
    - gradient_boosting
    - xgboost
    - lightgbm

visualization:
  style: "seaborn-v0_8-whitegrid"
  palette: "viridis"
  figure_dpi: 150
  output_dir: "visualizations/output"
